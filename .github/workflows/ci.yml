name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
        env:
          # Build only needs these to be non-empty; data is fetched at runtime.
          # CoinGecko routes are server-rendered on demand; the public Supabase
          # vars must exist so the browser client constructs during prerender of
          # the app-shell pages (e.g. /_not-found, /alerts). Real values live in
          # the Vercel project env, not here.
          COINGECKO_API_KEY: ci-placeholder-key
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
