name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
        env:
          # Data is fetched at runtime; CoinGecko routes render on demand. The
          # Supabase client falls back to inert placeholders during prerender
          # (see lib/supabase/env.ts), so no NEXT_PUBLIC_SUPABASE_* are needed
          # here. Real values live in the Vercel project env.
          COINGECKO_API_KEY: ci-placeholder-key
